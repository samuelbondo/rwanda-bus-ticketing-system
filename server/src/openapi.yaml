openapi: 3.0.3
info:
  title: Rwanda Bus Ticketing API
  description: |
    REST API for the Rwanda Bus Ticketing System.
    Supports passenger booking, seat management, schedules, reports, and role-based access for Customers, Agents, and Admins.
  version: 1.0.0
  contact:
    name: Rwanda Bus Ticketing Team

servers:
  - url: http://localhost:5000/api
    description: Local development
  - url: https://rwanda-bus-api.railway.app/api
    description: Production

tags:
  - name: Auth
  - name: Users
  - name: Buses
  - name: Routes
  - name: Schedules
  - name: Seats
  - name: Bookings
  - name: Verify
  - name: Reports
  - name: Audit Logs

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [GUEST, CUSTOMER, AGENT, ADMIN]
        phone:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Bus:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        plateNumber:
          type: string
        capacity:
          type: integer
        imageUrl:
          type: string
          nullable: true
        isActive:
          type: boolean

    RouteStop:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        stopOrder:
          type: integer
        priceFromOrigin:
          type: number

    Route:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        origin:
          type: string
        destination:
          type: string
        distanceKm:
          type: number
          nullable: true
        basePrice:
          type: number
        isActive:
          type: boolean
        stops:
          type: array
          items:
            $ref: '#/components/schemas/RouteStop'

    Schedule:
      type: object
      properties:
        id:
          type: string
        route:
          $ref: '#/components/schemas/Route'
        bus:
          $ref: '#/components/schemas/Bus'
        departureTime:
          type: string
          format: date-time
        arrivalTime:
          type: string
          format: date-time
          nullable: true
        price:
          type: number
        status:
          type: string
          enum: [SCHEDULED, DEPARTED, COMPLETED, CANCELLED]
        availableSeats:
          type: integer

    Seat:
      type: object
      properties:
        id:
          type: string
        seatNumber:
          type: string
        isAvailable:
          type: boolean

    Booking:
      type: object
      properties:
        id:
          type: string
        user:
          $ref: '#/components/schemas/User'
        schedule:
          $ref: '#/components/schemas/Schedule'
        seat:
          $ref: '#/components/schemas/Seat'
        ticketNumber:
          type: string
        qrCode:
          type: string
        source:
          type: string
        destination:
          type: string
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELLED, USED]
        totalPrice:
          type: number
        bookedAt:
          type: string
          format: date-time

    ReportData:
      type: object
      properties:
        period:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        totalBookings:
          type: integer
        totalRevenue:
          type: number
        cancellationRate:
          type: number
        seatOccupancy:
          type: number
        bookingsPerDay:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              count:
                type: integer
              revenue:
                type: number
        popularRoutes:
          type: array
          items:
            type: object
            properties:
              route:
                type: string
              origin:
                type: string
              destination:
                type: string
              count:
                type: integer

    AuditLog:
      type: object
      properties:
        id:
          type: string
        user:
          $ref: '#/components/schemas/User'
          nullable: true
        action:
          type: string
        entity:
          type: string
        entityId:
          type: string
          nullable: true
        details:
          type: object
          nullable: true
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

paths:
  # ── AUTH ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                phone:
                  type: string
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
        '409':
          description: Email already registered

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
        '401':
          description: Invalid credentials

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        '200':
          description: Logged out

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
    put:
      tags: [Auth]
      summary: Update profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                avatarUrl:
                  type: string
      responses:
        '200':
          description: Profile updated

  /auth/change-password:
    put:
      tags: [Auth]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed
        '401':
          description: Current password incorrect

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset link sent if email exists

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid or expired token

  # ── USERS ─────────────────────────────────────────────────────────────────
  /users:
    get:
      tags: [Users]
      summary: List all users (Admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
    post:
      tags: [Users]
      summary: Create a user (Admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                phone:
                  type: string
                role:
                  type: string
                  enum: [CUSTOMER, AGENT, ADMIN]
      responses:
        '201':
          description: User created

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
        '404':
          description: Not found
    put:
      tags: [Users]
      summary: Update user (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                role:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: User updated
    delete:
      tags: [Users]
      summary: Deactivate user (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deactivated

  # ── BUSES ─────────────────────────────────────────────────────────────────
  /buses:
    get:
      tags: [Buses]
      summary: List all buses
      responses:
        '200':
          description: List of buses
    post:
      tags: [Buses]
      summary: Create a bus (Admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, plateNumber, capacity]
              properties:
                name:
                  type: string
                plateNumber:
                  type: string
                capacity:
                  type: integer
                imageUrl:
                  type: string
      responses:
        '201':
          description: Bus created

  /buses/{id}:
    put:
      tags: [Buses]
      summary: Update a bus (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Bus updated
    delete:
      tags: [Buses]
      summary: Deactivate a bus (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bus deactivated

  # ── ROUTES ────────────────────────────────────────────────────────────────
  /routes:
    get:
      tags: [Routes]
      summary: List all routes
      responses:
        '200':
          description: List of routes
    post:
      tags: [Routes]
      summary: Create a route (Admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, origin, destination, basePrice]
              properties:
                name:
                  type: string
                origin:
                  type: string
                destination:
                  type: string
                distanceKm:
                  type: number
                basePrice:
                  type: number
                stops:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      stopOrder:
                        type: integer
                      priceFromOrigin:
                        type: number
      responses:
        '201':
          description: Route created

  /routes/{id}:
    put:
      tags: [Routes]
      summary: Update a route (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Route updated
    delete:
      tags: [Routes]
      summary: Deactivate a route (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Route deactivated

  # ── SCHEDULES ─────────────────────────────────────────────────────────────
  /schedules:
    get:
      tags: [Schedules]
      summary: Search schedules (public)
      parameters:
        - in: query
          name: origin
          schema:
            type: string
          description: Filter by origin city
        - in: query
          name: date
          schema:
            type: string
            format: date
          description: Filter by departure date (YYYY-MM-DD)
      responses:
        '200':
          description: List of schedules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Schedule'
    post:
      tags: [Schedules]
      summary: Create a schedule (Admin/Agent)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [routeId, busId, departureTime, price]
              properties:
                routeId:
                  type: string
                busId:
                  type: string
                departureTime:
                  type: string
                  format: date-time
                arrivalTime:
                  type: string
                  format: date-time
                price:
                  type: number
      responses:
        '201':
          description: Schedule created

  /schedules/{id}:
    get:
      tags: [Schedules]
      summary: Get schedule by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Schedule found
        '404':
          description: Not found
    put:
      tags: [Schedules]
      summary: Update a schedule (Admin/Agent)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Schedule updated
    delete:
      tags: [Schedules]
      summary: Cancel a schedule (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Schedule cancelled and passengers notified

  # ── SEATS ─────────────────────────────────────────────────────────────────
  /seats/{scheduleId}:
    get:
      tags: [Seats]
      summary: Get seat availability for a schedule
      parameters:
        - in: path
          name: scheduleId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of seats with availability
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Seat'

  # ── BOOKINGS ──────────────────────────────────────────────────────────────
  /bookings:
    post:
      tags: [Bookings]
      summary: Create a booking (Customer)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scheduleId, seatId, source, destination]
              properties:
                scheduleId:
                  type: string
                seatId:
                  type: string
                source:
                  type: string
                destination:
                  type: string
      responses:
        '201':
          description: Booking created (PENDING)
        '400':
          description: Schedule unavailable or booking window closed
        '409':
          description: Seat already booked
    get:
      tags: [Bookings]
      summary: List bookings (Customer — own; Admin — all)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of bookings

  /bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get booking details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Booking details
        '404':
          description: Not found
    delete:
      tags: [Bookings]
      summary: Cancel a booking
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Booking cancelled
        '400':
          description: Cancellation window passed

  /bookings/{id}/pay:
    post:
      tags: [Bookings]
      summary: Confirm payment for a booking (Customer)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [method]
              properties:
                method:
                  type: string
                  enum: [MOMO, CARD, CASH]
                reference:
                  type: string
      responses:
        '200':
          description: Payment confirmed, booking is CONFIRMED
        '400':
          description: Payment window closed

  /bookings/{id}/ticket:
    get:
      tags: [Bookings]
      summary: Download PDF ticket
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # ── VERIFY ────────────────────────────────────────────────────────────────
  /verify:
    post:
      tags: [Verify]
      summary: Verify a QR code at boarding (Agent)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticketNumber]
              properties:
                ticketNumber:
                  type: string
      responses:
        '200':
          description: Ticket valid and marked as USED
        '400':
          description: Ticket already used or invalid status
        '404':
          description: Ticket not found

  # ── REPORTS ───────────────────────────────────────────────────────────────
  /reports:
    get:
      tags: [Reports]
      summary: Get report data (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [daily, weekly, monthly, yearly]
            default: monthly
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Report data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ReportData'

  /reports/export:
    get:
      tags: [Reports]
      summary: Export report as PDF or CSV (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [daily, weekly, monthly, yearly]
            default: monthly
        - in: query
          name: format
          schema:
            type: string
            enum: [pdf, csv, excel]
            default: pdf
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Exported file (PDF or CSV)

  # ── AUDIT LOGS ────────────────────────────────────────────────────────────
  /audit-logs:
    get:
      tags: [Audit Logs]
      summary: List audit log entries (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated audit logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  total:
                    type: integer
                  page:
                    type: integer
                  totalPages:
                    type: integer
